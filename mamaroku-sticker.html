<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>mamaroku | sticker maker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f6f2;--sur:#fdfcfa;--bd:#d8d4cc;--bdl:#e8e4de;--text:#3a3630;--muted:#5a5450;--faint:#7a7670;--acc:#5a524a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;color:var(--text);overflow:hidden;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:var(--bg);z-index:100;}
.ll{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;letter-spacing:.35em;color:var(--text);text-transform:uppercase;margin-bottom:.2rem;}
.ls{font-size:9px;letter-spacing:.3em;color:var(--faint);margin-bottom:2rem;text-transform:uppercase;}
.lf{width:100%;max-width:300px;border:1px solid var(--bd);padding:1.4rem;background:var(--sur);position:relative;}
.lf::before{content:'';position:absolute;inset:5px;border:1px solid var(--bdl);pointer-events:none;}
.ln{font-size:11px;color:var(--muted);text-align:center;margin-bottom:1.1rem;line-height:1.7;}
.ln strong{color:var(--acc);}
#pw-input{width:100%;padding:8px 10px;font-size:13px;letter-spacing:.1em;border:none;border-bottom:1px solid var(--bd);background:transparent;color:var(--text);outline:none;margin-bottom:1.1rem;font-family:inherit;}
#pw-input::placeholder{color:var(--faint);letter-spacing:.12em;}
#pw-btn{width:100%;padding:9px;font-size:10px;font-weight:300;letter-spacing:.3em;text-transform:uppercase;background:transparent;color:var(--text);border:1px solid var(--bd);cursor:pointer;font-family:inherit;transition:all .2s;}
#pw-btn:hover{background:var(--text);color:var(--bg);}
#pw-error{font-size:11px;color:#a06060;text-align:center;margin-top:7px;min-height:14px;}

/* ── MAIN: single column ── */
#main-screen{display:none;position:fixed;inset:0;flex-direction:column;}
#main-screen.active{display:flex;}

/* TOP BAR: size + save + copy */
#top-bar{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;flex-shrink:0;
  background:var(--sur);border-bottom:1px solid var(--bdl);
  min-height:52px;
}
.top-label{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);white-space:nowrap;flex-shrink:0;}
.sz-btns{display:flex;gap:3px;flex:1;min-width:0;}
.szbtn{flex:1;padding:4px 2px;font-size:8px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.szbtn.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.top-divider{width:1px;height:20px;background:var(--bdl);flex-shrink:0;}
.top-btn{padding:5px 10px;font-size:9px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.top-btn:hover:not(:disabled){background:var(--text);color:var(--bg);border-color:var(--text);}
.top-btn:disabled{opacity:.3;cursor:default;}
.top-action{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 14px;border:1px solid var(--bd);min-height:44px;}
.top-action svg{width:22px;height:22px;flex-shrink:0;}
.top-action span{font-size:8px;letter-spacing:.12em;}
.top-action:not(:disabled):hover{background:var(--text);color:var(--bg);border-color:var(--text);}

/* PREVIEW AREA */
#preview-area{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);padding:8px;gap:6px;
  position:relative;
}
#preview{display:block;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
/* zoom row */
#zoom-row{display:flex;align-items:center;gap:8px;padding:5px 10px;flex-shrink:0;background:var(--sur);border-top:1px solid var(--bdl);}
#zoom-row span{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
input[type=range]{flex:1;accent-color:var(--acc);cursor:pointer;}
#zoom-val{font-size:9px;color:var(--acc);min-width:30px;text-align:right;}

/* TOOL BAR: photo / shape-cat / border icons */
#tool-bar{
  display:flex;align-items:center;
  padding:0;flex-shrink:0;
  background:var(--sur);border-top:1px solid var(--bdl);border-bottom:1px solid var(--bdl);
}
.tool-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:7px 2px;cursor:pointer;
  border-right:1px solid var(--bdl);transition:background .15s;
  border:none;background:transparent;font-family:inherit;
}
.tool-btn:last-child{border-right:none;}
.tool-btn.active{background:var(--text);}
.tool-btn.active svg{stroke:#f8f6f2;}
.tool-btn.active .tool-lbl{color:#f8f6f2;}
.tool-btn svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.tool-lbl{font-size:7px;letter-spacing:.1em;color:var(--faint);}

/* PANEL: slides up from bottom */
#panel{
  background:var(--sur);border-top:1px solid var(--bdl);
  flex-shrink:0;overflow:hidden;
  transition:max-height .25s ease;
  max-height:0;
}
#panel.open{max-height:280px;}
.panel-inner{padding:8px 10px;}

/* photo panel */
#panel-photo label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:12px;
  border:1px solid var(--bd);background:var(--bg);cursor:pointer;
  position:relative;transition:border-color .2s;
}
#panel-photo label::before{content:'';position:absolute;inset:3px;border:1px solid var(--bdl);pointer-events:none;}
#panel-photo label:hover{border-color:var(--acc);}
#panel-photo .uplus{font-size:18px;color:var(--faint);}
#panel-photo .utxt{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);}

/* shape panel */
#panel-shape .cat-row{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap;}
.cat-opt{padding:4px 8px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.cat-opt.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.sgrid{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;}
.sbtn{aspect-ratio:1;border:1px solid var(--bdl);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;transition:border-color .1s,background .1s;}
.sbtn:hover{border-color:var(--bd);}
.sbtn.selected{border:1.5px solid var(--acc);background:var(--bg);}
.sbtn svg{width:100%;height:100%;display:block;}

/* border panel */
#panel-border .bopt-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.bopt{padding:4px 8px;font-size:9px;letter-spacing:.08em;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.bopt.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.crow{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.csw:hover,.csw.selected{border-color:var(--acc);transform:scale(1.15);}

#copy-ok{font-size:8px;color:var(--acc);text-align:center;padding:2px;flex-shrink:0;}

/* copy modal */
#color-picker{padding:2px 0;}
#hue-slider{height:10px;border-radius:5px;}
.cpreset{width:18px;height:18px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;transition:transform .1s,border-color .1s;}
.cpreset:hover,.cpreset.active{border-color:var(--acc);transform:scale(1.15);}
#copy-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
#copy-modal.show{opacity:1;pointer-events:all;}
#copy-modal-img{max-width:85vw;max-height:55vh;border-radius:8px;display:block;}
#copy-modal-hint{font-size:13px;color:#fff;text-align:center;line-height:1.8;max-width:280px;}
#copy-modal-hint strong{color:#f4c9c9;}
#copy-modal-close{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.3);background:transparent;padding:9px 24px;cursor:pointer;font-family:inherit;}

#footer-logo{
  flex-shrink:0;
  text-align:center;
  padding:10px 0 12px;
  font-family:'Cormorant Garamond',serif;
  font-size:11px;font-weight:300;
  letter-spacing:.35em;text-transform:uppercase;
  color:var(--faint);
  background:var(--sur);
  border-top:1px solid var(--bdl);
}
#bbox-stage{position:absolute;visibility:hidden;pointer-events:none;left:-9999px;top:0;}
</style>
</head>
<body>
<!-- Hidden stage for getBBox() -->
<svg id="bbox-stage" xmlns="http://www.w3.org/2000/svg" width="3013" height="1174" viewBox="0 0 1000 1200">
  <g id="bbox-target" fill="#000"></g>
</svg>

<!-- LOGIN -->
<div id="login-screen">
  <div class="ll">mamaroku</div>
  <div class="ls">digital planner shop</div>
  <div class="lf">
    <p class="ln">ご購入いただいた方への<strong>特典ツール</strong>です<br>同封のパスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="password">
    <button id="pw-btn">enter</button>
    <div id="pw-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">

  <!-- TOP BAR: size / save / copy -->
  <div id="top-bar">
    <span class="top-label">size</span>
    <div class="sz-btns" id="size-row"></div>
    <div class="top-divider"></div>
    <button class="top-btn top-action" id="dl-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
      <span>save</span>
    </button>
    <button class="top-btn top-action" id="copy-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      <span>copy</span>
    </button>
  </div>

  <!-- PREVIEW -->
  <div id="preview-area">
    <canvas id="preview" width="240" height="240"></canvas>
  </div>
  <div id="zoom-row">
    <span>zoom</span>
    <input type="range" id="zoom" min="50" max="220" value="100" step="1">
    <span id="zoom-val">100%</span>
  </div>

  <div id="copy-ok"></div>

  <!-- TOOL BAR -->
  <div id="tool-bar">
    <!-- photo -->
    <button class="tool-btn" id="tool-photo" onclick="togglePanel('photo')">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M3 16l5-5 4 4 3-3 6 6"/></svg>
      <span class="tool-lbl">photo</span>
    </button>
    <!-- shape -->
    <button class="tool-btn" id="tool-shape" onclick="togglePanel('shape')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><polygon points="12,3 15,9 21,9 16.5,13.5 18,20 12,16.5 6,20 7.5,13.5 3,9 9,9"/></svg>
      <span class="tool-lbl">shape</span>
    </button>
    <!-- border -->
    <button class="tool-btn" id="tool-border" onclick="togglePanel('border')">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
      <span class="tool-lbl">border</span>
    </button>
    <!-- frame -->
    <button class="tool-btn" id="tool-frame" onclick="togglePanel('frame')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6" y="5" width="12" height="9" rx="1"/><line x1="6" y1="17" x2="18" y2="17"/><line x1="6" y1="19.5" x2="13" y2="19.5"/></svg>
      <span class="tool-lbl">frame</span>
    </button>
  </div>

  <!-- PANELS -->
  <div id="panel">
    <!-- photo panel -->
    <div class="panel-inner" id="panel-photo" style="display:none">
      <input type="file" id="file-in" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;">
      <label for="file-in">
        <div class="uplus">＋</div>
        <div class="utxt">tap to select photo</div>
      </label>
    </div>
    <!-- shape panel -->
    <div class="panel-inner" id="panel-shape" style="display:none">
      <div class="cat-row" id="cat-row"></div>
      <div class="sgrid" id="shape-grid"></div>
    </div>
    <!-- border panel -->
    <div class="panel-inner" id="panel-border" style="display:none">
      <div class="bopt-row" id="border-row"></div>
      <div id="color-wrap" style="display:none">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <input type="color" id="color-native" value="#ffffff" style="width:36px;height:36px;border:1px solid var(--bdl);border-radius:4px;cursor:pointer;padding:2px;background:var(--sur);">
          <span id="color-hex" style="font-size:10px;letter-spacing:.05em;color:var(--muted);">#FFFFFF</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;" id="color-presets"></div>
      </div>
    </div>
    <!-- frame panel -->
    <div class="panel-inner" id="panel-frame" style="display:none">
      <div style="display:flex;gap:6px;" id="frame-grid"></div>
      <div style="font-size:9px;color:var(--faint);margin-top:6px;letter-spacing:.05em;">写真がフレームの穴にはめ込まれます</div>
    </div>
  </div>

  <div id="footer-logo">mamaroku</div>
</div>

<!-- Copy modal -->
<div id="copy-modal" onclick="if(event.target===this)closeCopyModal()">
  <img id="copy-modal-img" src="" alt="sticker">
  <div id="copy-modal-hint">📱 画像を<strong>長押し</strong> →「コピー」<br>GoodNotesなど好きなアプリで<strong>ペースト</strong></div>
  <button id="copy-modal-close" onclick="closeCopyModal()">閉じる</button>
</div>

const PW='mamaroku123';
document.getElementById('pw-btn').onclick=chk;
document.getElementById('pw-input').onkeydown=e=>{if(e.key==='Enter')chk();};
function chk(){
  if(document.getElementById('pw-input').value===PW){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').classList.add('active');
    initUI();
    resizePreview();
  }else{
    document.getElementById('pw-error').textContent='パスワードが違います';
    document.getElementById('pw-input').value='';
  }
}

// ── State ──
const CATS=[...new Set(SHAPES.map(s=>s.cat))];
let activeCat=CATS[0], selIdx=0, selSize=400;
let borderStyle='none', borderColor='#ffffff';
let userImg=null, photoOx=0, photoOy=0;

// ── Panel toggle ──
let activePanel=null;
let colorPickerInited=false;
function togglePanel(name){
  const panel=document.getElementById('panel');
  const all=['photo','shape','border','frame'];
  if(activePanel===name){
    panel.classList.remove('open');
    all.forEach(n=>{ const p=document.getElementById('panel-'+n); const t=document.getElementById('tool-'+n); if(p)p.style.display='none'; if(t)t.classList.remove('active'); });
    activePanel=null;
  }else{
    all.forEach(n=>{ const p=document.getElementById('panel-'+n); const t=document.getElementById('tool-'+n); if(p)p.style.display='none'; if(t)t.classList.remove('active'); });
    document.getElementById('panel-'+name).style.display='block';
    document.getElementById('tool-'+name).classList.add('active');
    panel.classList.add('open');
    activePanel=name;
// color picker inited via bopt onclick
  }
  // パネル開閉後にcanvasサイズを再計算し、写真があれば必ず再描画する
  setTimeout(()=>{
    resizePreview();
    // resizePreviewでrender()が呼ばれなかった場合の保険
    if(userImg) requestAnimationFrame(()=>render());
  },300);
}

// ── Init UI ──
function initUI(){
  // Categories
  const catRow=document.getElementById('cat-row');
  CATS.forEach(cat=>{
    const b=document.createElement('div');
    b.className='cat-opt'+(cat===activeCat?' selected':'');
    b.textContent=cat.toUpperCase();
    b.onclick=()=>{
      document.querySelectorAll('.cat-opt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected'); activeCat=cat; renderGrid();
    };
    catRow.appendChild(b);
  });
  renderGrid();

  // Border options
  const BOPTS=[
    {val:'none',label:'なし'},
    {val:'border_thin',label:'フチ（細）'},
    {val:'border_thick',label:'フチ（太）'},
    {val:'bordershadow_thin',label:'フチ＋影（細）'},
    {val:'bordershadow_thick',label:'フチ＋影（太）'},
    {val:'shadow_only',label:'影のみ'},
  ];
  const brow=document.getElementById('border-row');
  BOPTS.forEach(opt=>{
    const b=document.createElement('div');
    b.className='bopt'+(opt.val==='none'?' selected':'');
    b.textContent=opt.label;
    b.onclick=()=>{
      document.querySelectorAll('.bopt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected'); borderStyle=opt.val;
      const showColor=borderStyle.startsWith('border');
      document.getElementById('color-wrap').style.display=showColor?'block':'none';
      if(showColor && !colorPickerInited){ colorPickerInited=true; initColorPicker(); }
      if(userImg) requestAnimationFrame(()=>render());
    };
    brow.appendChild(b);
  });

  // Color picker inits lazily when border panel first opens

  // Frame grid
  const frameGrid=document.getElementById('frame-grid');
  Object.entries(FRAMES).forEach(([key,f],i)=>{
    const btn=document.createElement('div');
    btn.style.cssText='cursor:pointer;border:1.5px solid var(--bdl);padding:3px;background:var(--sur);flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .15s;';
    const img=document.createElement('img');
    img.src=f.src;
    img.style.cssText='width:100%;display:block;';
    const lbl=document.createElement('div');
    lbl.textContent=f.label;
    lbl.style.cssText='font-size:8px;color:var(--faint);letter-spacing:.05em;';
    btn.appendChild(img); btn.appendChild(lbl);
    btn.onclick=()=>{
      document.querySelectorAll('#frame-grid div').forEach(b=>b.style.borderColor='var(--bdl)');
      btn.style.borderColor='var(--acc)';
      activeFrameKey=key;
      activeMode='frame';
      if(userImg) requestAnimationFrame(()=>render());
    };
    if(i===0){ activeFrameKey=key; }
    frameGrid.appendChild(btn);
  });

  // Sizes
  [{l:'S',p:200},{l:'M',p:400},{l:'L',p:600}].forEach(s=>{
    const b=document.createElement('div');
    b.className='szbtn'+(s.p===selSize?' selected':'');
    b.textContent=s.l;
    b.onclick=()=>{ document.querySelectorAll('.szbtn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selSize=s.p; render(); };
    document.getElementById('size-row').appendChild(b);
  });
}

// ── VBOXES ──
const bboxStage=document.getElementById('bbox-stage');
const bboxTarget=document.getElementById('bbox-target');
function getShapeViewBox(inner,pad=12){
  bboxTarget.innerHTML=inner;
  try{
    const bb=bboxTarget.getBBox();
    if(bb.width===0&&bb.height===0)return null;
    const size=Math.max(bb.width,bb.height);
    const cx=bb.x+bb.width/2, cy=bb.y+bb.height/2;
    return `${cx-size/2-pad} ${cy-size/2-pad} ${size+pad*2} ${size+pad*2}`;
  }catch(e){return null;}
}
const VBOXES=SHAPES.map(s=>getShapeViewBox(s.inner)||'0 0 1000 1000');
bboxTarget.innerHTML='';

function renderGrid(){
  const grid=document.getElementById('shape-grid'); grid.innerHTML='';
  // Reset selIdx to first shape in this category to prevent out-of-range
  const firstInCat=SHAPES.findIndex(s=>s.cat===activeCat);
  if(firstInCat>=0 && (selIdx<0||SHAPES[selIdx]?.cat!==activeCat)) selIdx=firstInCat;
  SHAPES.forEach((s,i)=>{
    if(s.cat!==activeCat)return;
    const btn=document.createElement('div');
    btn.className='sbtn'+(i===selIdx?' selected':'');
    const vb=VBOXES[i];
    const wrap=document.createElement('div');
    wrap.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" style="width:100%;height:100%;display:block;"><g fill="#8a8480">${s.inner}</g></svg>`;
    btn.appendChild(wrap.firstElementChild);
    btn.onclick=()=>{ document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('selected')); btn.classList.add('selected'); selIdx=i; render(); };
    grid.appendChild(btn);
  });
}

// ── File input ──
const fileIn=document.getElementById('file-in');
fileIn.addEventListener('change',e=>{
  if(e.target.files&&e.target.files[0]){
    const f=e.target.files[0];
    const rd=new FileReader();
    rd.onload=ev=>{
      const tmp=new Image();
      tmp.onload=()=>{
        userImg=tmp;
        document.getElementById('dl-btn').disabled=false;
        document.getElementById('copy-btn').disabled=false;
        document.getElementById('zoom').value=100;
        document.getElementById('zoom-val').textContent='100%';
        photoOx=0; photoOy=0;
        framePhotoOx=0; framePhotoOy=0;
        // Close panel
        activePanel=null;
        document.getElementById('panel').classList.remove('open');
        ['photo','shape','border'].forEach(n=>{ document.getElementById('panel-'+n).style.display='none'; document.getElementById('tool-'+n).classList.remove('active'); });
        // Resize then render - use rAF to ensure layout is complete
        requestAnimationFrame(()=>{
          resizePreview();
          requestAnimationFrame(()=>{ render(); });
        });
      };
      tmp.src=ev.target.result;
    };
    rd.readAsDataURL(f);
  }
  fileIn.value='';
});

// ── Zoom ──
document.getElementById('zoom').oninput=function(){ document.getElementById('zoom-val').textContent=this.value+'%'; render(); };

// ── Drag ──
let dragState=null, lastPinchDist=null;
const previewEl=document.getElementById('preview');
previewEl.addEventListener('contextmenu',e=>e.preventDefault());
previewEl.addEventListener('pointerdown',e=>{
  e.preventDefault();
  previewEl.setPointerCapture(e.pointerId);
  dragState={
    startX:e.clientX, startY:e.clientY,
    ox: activeMode==='frame' ? framePhotoOx : photoOx,
    oy: activeMode==='frame' ? framePhotoOy : photoOy
  };
  previewEl.style.cursor='grabbing';
});
previewEl.addEventListener('pointermove',e=>{
  if(!dragState)return;
  e.preventDefault();
  const sc=previewEl.width/previewEl.getBoundingClientRect().width;
  const dx=(e.clientX-dragState.startX)*sc;
  const dy=(e.clientY-dragState.startY)*sc;
  if(activeMode==='frame'){
    framePhotoOx=dragState.ox+dx;
    framePhotoOy=dragState.oy+dy;
  } else {
    photoOx=dragState.ox+dx;
    photoOy=dragState.oy+dy;
  }
  render();
});
previewEl.addEventListener('pointerup',()=>{ dragState=null; previewEl.style.cursor='grab'; });
previewEl.addEventListener('pointercancel',()=>{ dragState=null; previewEl.style.cursor='grab'; });
previewEl.addEventListener('touchstart',e=>{ if(e.touches.length===2){ dragState=null; lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }},{passive:true});
previewEl.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&lastPinchDist){
    e.preventDefault();
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const zEl=document.getElementById('zoom');
    zEl.value=Math.round(Math.min(220,Math.max(50,parseInt(zEl.value)*dist/lastPinchDist)));
    document.getElementById('zoom-val').textContent=zEl.value+'%';
    lastPinchDist=dist; render();
  }
},{passive:false});
previewEl.addEventListener('touchend',()=>{ lastPinchDist=null; });

// ── applyTransform / drawShapeElements / drawShapeMask / renderToCanvas ──
function applyTransform(ctx,tf){
  const tm=tf.match(/translate\(([-.\d]+)[\s,]+([-.\d]+)\)/);
  const rm=tf.match(/rotate\(([-.\d]+)\)/);
  const sm=tf.match(/scale\(([-.\d]+)\)/);
  if(tm)ctx.translate(+tm[1],+tm[2]);
  if(rm)ctx.rotate(+rm[1]*Math.PI/180);
  if(sm)ctx.scale(+sm[1],+sm[1]);
}
function drawShapeElements(ctx,size,mode,strokeWidth){
  const vbParts=VBOXES[selIdx].split(' ').map(Number);
  const vbX=vbParts[0],vbY=vbParts[1],vbW=vbParts[2],vbH=vbParts[3];
  const sc=Math.min(size/vbW,size/vbH);
  const tx=(size-vbW*sc)/2-vbX*sc;
  const ty=(size-vbH*sc)/2-vbY*sc;
  ctx.save(); ctx.translate(tx,ty); ctx.scale(sc,sc);
  if(mode==='stroke'){ ctx.lineWidth=strokeWidth/sc; ctx.lineJoin='round'; ctx.lineCap='round'; }
  const parser=new DOMParser();
  const doc=parser.parseFromString('<svg xmlns="http://www.w3.org/2000/svg">'+SHAPES[selIdx].inner+'</svg>','image/svg+xml');
  doc.querySelectorAll('path,circle,rect,ellipse,polygon').forEach(el=>{
    const t=el.tagName.toLowerCase();
    const tf2=el.getAttribute('transform');
    ctx.save();
    if(tf2) applyTransform(ctx,tf2);
    ctx.beginPath();
    if(t==='path'){
      const p=new Path2D(el.getAttribute('d'));
      if(mode==='fill') ctx.fill(p); else ctx.stroke(p);
    } else if(t==='circle'){
      ctx.arc(+el.getAttribute('cx')||0, +el.getAttribute('cy')||0, +el.getAttribute('r')||0, 0, Math.PI*2);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='ellipse'){
      ctx.ellipse(+el.getAttribute('cx')||0, +el.getAttribute('cy')||0, +el.getAttribute('rx')||0, +el.getAttribute('ry')||0, 0, 0, Math.PI*2);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='rect'){
      const rx=+el.getAttribute('rx')||0;
      const x=+el.getAttribute('x')||0, y=+el.getAttribute('y')||0;
      const w=+el.getAttribute('width')||0, h=+el.getAttribute('height')||0;
      if(rx>0) ctx.roundRect(x,y,w,h,rx); else ctx.rect(x,y,w,h);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='polygon'){
      const pts=(el.getAttribute('points')||'').trim().split(/[\s,]+/).map(Number);
      for(let i=0;i<pts.length;i+=2) i===0?ctx.moveTo(pts[i],pts[i+1]):ctx.lineTo(pts[i],pts[i+1]);
      ctx.closePath();
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();
}
function drawShapeMask(ctx,size){ ctx.fillStyle='#000'; drawShapeElements(ctx,size,'fill',0); }

function renderToCanvas(canvas,size){
  const hasBorder=borderStyle.startsWith('border');
  const hasShadow=borderStyle.includes('shadow')||borderStyle==='shadow_only';
  const isThick=borderStyle.includes('thick');
  const borderPx=hasBorder?(isThick?size*.11:size*.055):0;
  const borderOverhang=hasBorder?Math.ceil(borderPx):0;
  const shadowPad=hasShadow?Math.round(size*.08):0;
  const pad=borderOverhang+shadowPad;
  const full=size+pad*2;
  canvas.width=full; canvas.height=full;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,full,full);
  const zoom=parseInt(document.getElementById('zoom').value)/100;
  const previewW=previewEl.width||240;
  const ox=photoOx*(size/previewW);
  const oy=photoOy*(size/previewW);
  const photoC=document.createElement('canvas'); photoC.width=size; photoC.height=size;
  const pCtx=photoC.getContext('2d');
  if(userImg){ const sc=Math.max(size/userImg.width,size/userImg.height)*zoom; pCtx.drawImage(userImg,(size-userImg.width*sc)/2+ox,(size-userImg.height*sc)/2+oy,userImg.width*sc,userImg.height*sc); }
  const maskC=document.createElement('canvas'); maskC.width=size; maskC.height=size;
  drawShapeMask(maskC.getContext('2d'),size);
  pCtx.globalCompositeOperation='destination-in'; pCtx.drawImage(maskC,0,0);
  let borderC=null;
  if(hasBorder){
    borderC=document.createElement('canvas'); borderC.width=full; borderC.height=full;
    const bCtx=borderC.getContext('2d');
    bCtx.save(); bCtx.translate(pad,pad);
    bCtx.fillStyle=borderColor; drawShapeElements(bCtx,size,'fill',0);
    bCtx.strokeStyle=borderColor; drawShapeElements(bCtx,size,'stroke',borderPx*2);
    bCtx.globalCompositeOperation='destination-out'; drawShapeElements(bCtx,size,'fill',0);
    bCtx.restore();
  }
  if(hasShadow){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=shadowPad*1.6; ctx.shadowOffsetX=shadowPad*.2; ctx.shadowOffsetY=shadowPad*.5;
    if(borderC)ctx.drawImage(borderC,0,0); else ctx.drawImage(photoC,pad,pad);
    ctx.restore();
  }
  if(borderC)ctx.drawImage(borderC,0,0);
  ctx.drawImage(photoC,pad,pad);
}

// ── Frame mode ──
let activeMode='shape'; // 'shape' or 'frame'
let activeFrameKey=null;
let framePhotoOx=0, framePhotoOy=0;

function renderFrame(canvas, size){
  const frame=FRAMES[activeFrameKey];
  if(!frame||!userImg)return;

  // Canvas is square (size x size)
  // Scale frame image to fit canvas
  const sc=size/frame.imgW; // frame is square 600x600
  const fW=frame.imgW*sc, fH=frame.imgH*sc;

  canvas.width=size; canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);

  // Hole coordinates scaled
  const hx=frame.holeX*sc, hy=frame.holeY*sc;
  const hw=frame.holeW*sc, hh=frame.holeH*sc;

  const zoom=parseInt(document.getElementById('zoom').value)/100;
  const ox=framePhotoOx*(size/300);
  const oy=framePhotoOy*(size/300);

  // 1. Draw photo clipped to hole area
  ctx.save();
  ctx.rect(hx,hy,hw,hh);
  ctx.clip();
  const photoSc=Math.max(hw/userImg.width,hh/userImg.height)*zoom;
  const pdx=hx+(hw-userImg.width*photoSc)/2+ox;
  const pdy=hy+(hh-userImg.height*photoSc)/2+oy;
  ctx.drawImage(userImg,pdx,pdy,userImg.width*photoSc,userImg.height*photoSc);
  ctx.restore();

  // 2. Draw frame overlay on top
  const frameImg=new Image();
  frameImg.onload=()=>{
    ctx.drawImage(frameImg,0,0,size,size);
  };
  frameImg.src=frame.src;
}

function renderFrameSync(canvas, size){
  // For download - use promise
  return new Promise(resolve=>{
    const frame=FRAMES[activeFrameKey];
    if(!frame||!userImg){resolve();return;}
    const sc=size/frame.imgW;
    const hx=frame.holeX*sc, hy=frame.holeY*sc;
    const hw=frame.holeW*sc, hh=frame.holeH*sc;
    const zoom=parseInt(document.getElementById('zoom').value)/100;
    const ox=framePhotoOx*(size/300);
    const oy=framePhotoOy*(size/300);
    canvas.width=size; canvas.height=size;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    ctx.save();
    ctx.beginPath();ctx.rect(hx,hy,hw,hh);ctx.clip();
    const photoSc=Math.max(hw/userImg.width,hh/userImg.height)*zoom;
    ctx.drawImage(userImg,hx+(hw-userImg.width*photoSc)/2+ox,hy+(hh-userImg.height*photoSc)/2+oy,userImg.width*photoSc,userImg.height*photoSc);
    ctx.restore();
    const frameImg=new Image();
    frameImg.onload=()=>{ ctx.drawImage(frameImg,0,0,size,size); resolve(); };
    frameImg.src=frame.src;
  });
}

function render(){
  if(!userImg)return;
  try{
    const cv=document.getElementById('preview');
    const sz=cv.width||240;
    if(activeMode==='frame'){
      renderFrame(cv, sz);
    } else {
      renderToCanvas(cv, sz);
    }
  }catch(e){
    console.warn('render error:',e);
  }
}

// ── Download / Copy ──
document.getElementById('dl-btn').onclick=async()=>{
  if(!userImg)return;
  const off=document.createElement('canvas');
  if(activeMode==='frame'){
    await renderFrameSync(off,selSize);
    setTimeout(()=>{
      const a=document.createElement('a'); a.href=off.toDataURL('image/png'); a.download='mamaroku-sticker.png'; a.click();
    },100);
  } else {
    renderToCanvas(off,selSize);
    const a=document.createElement('a'); a.href=off.toDataURL('image/png'); a.download='mamaroku-sticker.png'; a.click();
  }
};
function closeCopyModal(){ document.getElementById('copy-modal').classList.remove('show'); document.getElementById('copy-modal-img').src=''; }
document.getElementById('copy-btn').onclick=async()=>{
  if(!userImg)return;
  const off=document.createElement('canvas');
  if(activeMode==='frame'){
    await renderFrameSync(off,selSize);
    setTimeout(()=>{
      document.getElementById('copy-modal-img').src=off.toDataURL('image/png');
      document.getElementById('copy-modal').classList.add('show');
    },100);
  } else {
    renderToCanvas(off,selSize);
    document.getElementById('copy-modal-img').src=off.toDataURL('image/png');
    document.getElementById('copy-modal').classList.add('show');
  }
};


// ── Color Picker ──
function initColorPicker(){
  const PRESETS=['#231815','#ffffff','#efefef','#d4dad4','#c2ccd2','#e0ddca','#cc98a5','#527586','#83867e','#604c3f'];
  const presetsEl=document.getElementById('color-presets');
  if(!presetsEl) return;
  presetsEl.innerHTML='';
  PRESETS.forEach(col=>{
    const p=document.createElement('div');
    p.style.cssText=`width:22px;height:22px;border-radius:50%;background:${col};cursor:pointer;border:1.5px solid ${col==='#ffffff'||col==='#efefef'?'#bbb':'transparent'};flex-shrink:0;transition:transform .1s;`;
    p.onclick=()=>{
      borderColor=col;
      document.getElementById('color-native').value=col;
      document.getElementById('color-hex').textContent=col.toUpperCase();
      if(userImg) requestAnimationFrame(()=>render());
    };
    presetsEl.appendChild(p);
  });

  const native=document.getElementById('color-native');
  if(native){
    native.value=borderColor;
    native.oninput=function(){
      borderColor=this.value;
      document.getElementById('color-hex').textContent=this.value.toUpperCase();
      if(userImg) requestAnimationFrame(()=>render());
    };
  }
}

// ── Resize preview ──// ── Resize preview ──
function resizePreview(){
  const main=document.getElementById('main-screen');
  if(!main||!main.classList.contains('active'))return;
  const topBar=document.getElementById('top-bar');
  const zoomRow=document.getElementById('zoom-row');
  const toolBar=document.getElementById('tool-bar');
  const panel=document.getElementById('panel');
  const footer=document.getElementById('footer-logo');
  const H=window.innerHeight;
  const W=window.innerWidth;
  const usedH=(topBar?topBar.offsetHeight:40)
             +(zoomRow?zoomRow.offsetHeight:28)
             +(toolBar?toolBar.offsetHeight:50)
             +(panel?panel.offsetHeight:0)
             +(footer?footer.offsetHeight:28)
             +40;
  const sz=Math.max(80, Math.min(H-usedH, W-16));
  const cv=document.getElementById('preview');
  if(!cv)return;
  // サイズが変わった時だけcanvasをリセット（フチ選択で不必要にリセットされるのを防ぐ）
  if(cv.width!==sz || cv.height!==sz){
    cv.width=sz; cv.height=sz;
    cv.style.width=sz+'px'; cv.style.height=sz+'px';
    if(userImg) render();
  } else {
    // サイズが同じでも描画内容が消えている可能性があるので再描画
    if(userImg) render();
  }
}
window.addEventListener('resize',resizePreview);
