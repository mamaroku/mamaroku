<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>mamaroku | sticker maker</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="mamaroku">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f6f2;--sur:#fdfcfa;--bd:#d8d4cc;--bdl:#e8e4de;--text:#3a3630;--muted:#5a5450;--faint:#7a7670;--acc:#5a524a;--hover:#f0ede8;--brown:#3a3630;--rose:#a06070;--blush:#f5eee8;--dusty:#6a5055;--cream:#fdfcfa;}


*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;color:var(--text);overflow:hidden;}

/* ── MAIN: single column ── */
#main-screen{display:none;position:fixed;inset:0;flex-direction:column;}
#main-screen.active{display:flex;}

/* TOP BAR: save + copy */
#top-bar{
  display:flex;align-items:center;justify-content:flex-end;gap:6px;
  padding:6px 10px;flex-shrink:0;
  background:var(--sur);border-bottom:1px solid var(--bdl);
  min-height:52px;
}
.top-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);white-space:nowrap;flex-shrink:0;}
.sz-btns{display:flex;gap:3px;flex:1;min-width:0;}
.szbtn{flex:1;padding:4px 2px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.szbtn.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.top-divider{width:1px;height:20px;background:var(--bdl);flex-shrink:0;}
.top-btn{padding:5px 10px;font-size:12px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.top-btn:hover:not(:disabled){background:var(--text);color:var(--bg);border-color:var(--text);}
.top-btn:disabled{opacity:.3;cursor:default;}
.top-action{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 14px;border:1px solid var(--bd);min-height:44px;}
.top-action svg{width:22px;height:22px;flex-shrink:0;}
.top-action span{font-size:11px;letter-spacing:.12em;}
.top-action:not(:disabled):hover{background:var(--text);color:var(--bg);border-color:var(--text);}

/* PREVIEW AREA */
#preview-area{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#c8c3bb;padding:8px;gap:6px;
  position:relative;
}
#preview{display:block;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
/* zoom row */
#zoom-row{display:flex;align-items:center;gap:8px;padding:5px 10px;flex-shrink:0;background:var(--sur);border-top:1px solid var(--bdl);}
#zoom-row span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
input[type=range]{flex:1;accent-color:var(--acc);cursor:pointer;}
#zoom-val{font-size:12px;color:var(--acc);min-width:34px;text-align:right;}
/* size row */
#size-row-wrap{display:flex;align-items:center;gap:8px;padding:4px 10px;flex-shrink:0;background:var(--sur);border-top:1px solid var(--bdl);}
#size-row-wrap .sz-btns{flex:1;}

/* TOOL BAR: photo / shape-cat / border icons */
#tool-bar{
  display:flex;align-items:center;
  padding:0;flex-shrink:0;
  background:var(--sur);border-top:1px solid var(--bdl);border-bottom:1px solid var(--bdl);
}
.tool-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:7px 2px;cursor:pointer;
  border-right:1px solid var(--bdl);transition:background .15s;
  border:none;background:transparent;font-family:inherit;
}
.tool-btn:last-child{border-right:none;}
.tool-btn:hover:not(.active){background:var(--hover);}
.tool-btn.active{background:var(--text);}
.tool-btn.active svg{stroke:#f8f6f2;}
.tool-btn.active .tool-lbl{color:#f8f6f2;}
.tool-btn svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.tool-lbl{font-size:10px;letter-spacing:.1em;color:var(--faint);}

/* PANEL: slides up from bottom */
#panel{
  background:var(--sur);border-top:1px solid var(--bdl);
  flex-shrink:0;overflow:hidden;
  transition:max-height .25s ease;
  max-height:0;
}
#panel.open{max-height:380px;}
.panel-inner{padding:8px 10px;overflow-y:auto;max-height:366px;}
.panel-inner::-webkit-scrollbar{width:3px;}
.panel-inner::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:2px;}

/* photo panel */
#panel-photo label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:18px;min-height:88px;
  border:1.5px dashed var(--bd);background:var(--bg);cursor:pointer;
  position:relative;transition:border-color .2s,background .2s;border-radius:2px;
}
#panel-photo label.drag-over{border-color:var(--acc);background:var(--hover);border-style:solid;}
#panel-photo label:hover{border-color:var(--acc);}
#panel-photo .uplus{font-size:21px;color:var(--faint);transition:transform .2s;line-height:1;}
#panel-photo label:hover .uplus{transform:scale(1.18);}
#panel-photo .utxt{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);}
#panel-photo .usub{font-size:10px;color:var(--faint);opacity:.55;letter-spacing:.06em;}

/* shape panel */
#panel-shape .cat-row{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap;}
.cat-opt{padding:4px 8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.cat-opt.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.sgrid{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;}
.sbtn{aspect-ratio:1;border:1px solid var(--bdl);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;transition:border-color .1s,background .1s;}
.sbtn:hover{border-color:var(--bd);}
.sbtn.selected{border:1.5px solid var(--acc);background:var(--bg);}
.sbtn svg{width:100%;height:100%;display:block;}

/* border panel */
#panel-border .bopt-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.bopt{padding:4px 8px;font-size:12px;letter-spacing:.08em;border:1px solid var(--bdl);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.bopt.selected{background:var(--text);border-color:var(--text);color:var(--bg);}
.crow{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.csw:hover,.csw.selected{border-color:var(--acc);transform:scale(1.15);}

#copy-ok{font-size:11px;color:var(--acc);text-align:center;padding:2px;flex-shrink:0;}

/* copy modal */
#color-picker{padding:2px 0;}
#hue-slider{height:10px;border-radius:5px;}
.cpreset{width:18px;height:18px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;transition:transform .1s,border-color .1s;}
.cpreset:hover,.cpreset.active{border-color:var(--acc);transform:scale(1.15);}
#copy-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
#copy-modal.show{opacity:1;pointer-events:all;}
#copy-modal-img{max-width:85vw;max-height:55vh;border-radius:8px;display:block;}
#copy-modal-hint{font-size:14px;color:#fff;text-align:center;line-height:1.8;max-width:280px;}
#copy-modal-hint strong{color:#f4c9c9;}
#copy-modal-close{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.3);background:transparent;padding:9px 24px;cursor:pointer;font-family:inherit;}

#footer-logo{
  flex-shrink:0;
  text-align:center;
  padding:10px 0 12px;
  font-family:'Cormorant Garamond',serif;
  font-size:12px;font-weight:300;
  letter-spacing:.35em;text-transform:uppercase;
  color:var(--faint);
  background:var(--sur);
  border-top:1px solid var(--bdl);
}
#bbox-stage{position:absolute;visibility:hidden;pointer-events:none;left:-9999px;top:0;}

/* ── 素材ギャラリー画面 ── */
#material-screen {
  display: none;
  flex-direction: column;
  height: 100%;
}
#material-screen.active { display: flex; }
.mat-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(180,130,120,0.15);
  flex-shrink: 0;
}
.mat-header h2 {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  font-size:19px;
  color: var(--brown);
  letter-spacing: 0.1em;
  flex: 1;
}
.mat-back {
  background: none;
  border: 1px solid var(--rose);
  border-radius: 20px;
  padding: 5px 14px;
  font-size:13px;
  color: var(--rose);
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.18s;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.mat-back:hover { background: var(--blush); }
.mat-filter {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  border-bottom: 1px solid rgba(180,130,120,0.15);
  flex-shrink: 0;
}
.mat-filter-btn {
  padding: 6px 14px;
  font-size:12px;
  letter-spacing: 0.08em;
  border: 1px solid var(--rose);
  background: transparent;
  color: var(--brown);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.mat-filter-btn:hover {
  background: var(--blush);
}
.mat-filter-btn.active {
  background: var(--rose);
  color: #fff;
  border-color: var(--rose);
}
.mat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 3px;
  padding: 6px;
  overflow-y: auto;
  flex: 1;
  align-content: start;
}
.mat-card {
  background: transparent;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  border: 1.5px solid #000;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1/1;
  padding: 4px;
}
.mat-card:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 20px rgba(180,130,120,0.2);
  border-color: var(--rose);
}
.mat-card:active { transform: scale(0.97); }
.mat-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: transparent;
  mix-blend-mode: normal;
}
.mat-label {
  display: none;
}
.mat-hint {
  display: none;
}

.mat-btns {
  display: none;
}
.mat-btn {
  flex: 1;
  padding: 6px 0;
  border-radius: 20px;
  border: none;
  font-size:12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.18s;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.mat-btn-copy {
  background: var(--blush);
  color: var(--brown);
}
.mat-btn-copy:hover { background: var(--rose); color: #fff; }
.mat-btn-trim {
  background: var(--brown);
  color: #fff;
}
.mat-btn-trim:hover { background: var(--dusty); }

/* ── preview placeholder ── */
#preview-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;pointer-events:none;z-index:1;}
#preview-placeholder .ph-icon{font-size:29px;opacity:.18;}
#preview-placeholder .ph-text{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);opacity:.65;}

/* ── zoom reset ── */
.zoom-reset{background:none;border:1px solid var(--bdl);color:var(--faint);font-size:14px;line-height:1;padding:2px 6px;cursor:pointer;font-family:inherit;transition:all .15s;border-radius:1px;flex-shrink:0;}
.zoom-reset:hover{border-color:var(--acc);color:var(--acc);}

/* ── shape btn hover scale ── */
.sbtn:hover{border-color:var(--bd);background:var(--hover);transform:scale(1.06);}
.sbtn{transition:border-color .1s,background .1s,transform .1s;}

/* ── category tab hover ── */
.cat-opt:hover:not(.selected){background:var(--hover);border-color:var(--bd);}

/* ── border opt hover ── */
.bopt:hover:not(.selected){background:var(--hover);border-color:var(--bd);}

/* ── size btn hover ── */
.szbtn:hover:not(.selected){background:var(--hover);border-color:var(--bd);}

/* ── save button active flash ── */
@keyframes btnFlash{0%{background:var(--text);color:var(--bg);}100%{background:transparent;color:var(--text);}}
.btn-flash{animation:btnFlash .6s ease;}

/* ── PREMIUM MODAL ── */
#premium-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
#premium-modal.show{opacity:1;pointer-events:all;}
#premium-modal-box{background:var(--sur);border:1px solid var(--bd);padding:28px 24px 20px;max-width:300px;width:100%;display:flex;flex-direction:column;gap:10px;position:relative;}
#premium-modal-box::before{content:'';position:absolute;inset:5px;border:1px solid var(--bdl);pointer-events:none;}
#premium-modal-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:.2em;text-align:center;color:var(--text);margin-bottom:2px;}
#premium-modal-desc{font-size:11px;letter-spacing:.08em;color:var(--muted);text-align:center;line-height:1.7;}
#premium-code-input{width:100%;padding:8px 10px;font-size:15px;letter-spacing:.25em;border:none;border-bottom:1px solid var(--bd);background:transparent;color:var(--text);outline:none;font-family:inherit;text-align:center;margin-top:4px;}
#premium-code-input::placeholder{color:var(--faint);letter-spacing:.12em;font-size:13px;}
#premium-code-error{font-size:12px;color:#a06060;text-align:center;min-height:14px;}
#premium-code-submit{width:100%;padding:9px;font-size:11px;font-weight:300;letter-spacing:.3em;text-transform:uppercase;background:transparent;color:var(--text);border:1px solid var(--bd);cursor:pointer;font-family:inherit;transition:all .2s;}
#premium-code-submit:hover{background:var(--text);color:var(--bg);}
#premium-modal-cancel{width:100%;padding:7px;font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;background:transparent;color:var(--faint);border:none;cursor:pointer;font-family:inherit;}
.cat-opt.premium-locked{opacity:0.5;}
.mat-filter-btn.premium-locked{opacity:0.5;}
</style>
</head>
<body>
<!-- Hidden stage for getBBox() -->
<svg id="bbox-stage" xmlns="http://www.w3.org/2000/svg" width="3013" height="1174" viewBox="0 0 1000 1200">
  <g id="bbox-target" fill="#000"></g>
</svg>

<!-- LOGIN -->

<!-- MAIN -->
<div id="material-screen">
  <div class="mat-header">
    <h2>素材を選ぶ</h2>
    <button class="mat-back" onclick="hideMaterialScreen()">← もどる</button>
  </div>
  <div class="mat-filter" id="mat-filter">
    <button class="mat-filter-btn active" data-category="all">すべて</button>
  </div>
  <div class="mat-grid" id="mat-grid"></div>

</div>
<div id="main-screen" class="active">

  <!-- TOP BAR: save / copy -->
  <div id="top-bar">
    <button class="top-btn top-action" id="dl-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2"/></svg>
      <span>save</span>
    </button>
    <button class="top-btn top-action" id="copy-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      <span>copy</span>
    </button>
  </div>

  <!-- PREVIEW -->
  <div id="preview-area">
    <canvas id="preview" width="240" height="240"></canvas>
    <div id="preview-placeholder">
      <div class="ph-icon">📷</div>
      <div class="ph-text">写真を選んでください</div>
    </div>
  </div>
  <div id="zoom-row">
    <span>zoom</span>
    <input type="range" id="zoom" min="50" max="220" value="100" step="1">
    <span id="zoom-val">100%</span>
    <button class="zoom-reset" id="zoom-reset" title="100%にリセット">↺</button>
  </div>
  <div id="size-row-wrap">
    <span class="top-label">size</span>
    <div class="sz-btns" id="size-row"></div>
  </div>

  <div id="copy-ok"></div>

  <!-- TOOL BAR -->
  <div id="tool-bar">
    <!-- photo -->
    <button class="tool-btn" id="tool-photo" onclick="togglePanel('photo')">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M3 16l5-5 4 4 3-3 6 6"/></svg>
      <span class="tool-lbl">photo</span>
    </button>
    <!-- shape -->
    <button class="tool-btn" id="tool-shape" onclick="togglePanel('shape')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><polygon points="12,3 15,9 21,9 16.5,13.5 18,20 12,16.5 6,20 7.5,13.5 3,9 9,9"/></svg>
      <span class="tool-lbl">shape</span>
    </button>
    <!-- border -->
    <button class="tool-btn" id="tool-border" onclick="togglePanel('border')">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
      <span class="tool-lbl">border</span>
    </button>
    <!-- material -->
    <button class="tool-btn" id="tool-material" onclick="showMaterialScreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="tool-lbl">素材</span>
    </button>
  </div>

  <!-- PANELS -->
  <div id="panel">
    <!-- photo panel -->
    <div class="panel-inner" id="panel-photo" style="display:none">
      <input type="file" id="file-in" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;">
      <label for="file-in">
        <div class="uplus">＋</div>
        <div class="utxt">写真を選ぶ</div>
        <div class="usub">またはドラッグ＆ドロップ</div>
      </label>
    </div>
    <!-- shape panel -->
    <div class="panel-inner" id="panel-shape" style="display:none">
      <div class="cat-row" id="cat-row"></div>
      <div class="sgrid" id="shape-grid"></div>
    </div>
    <!-- border panel -->
    <div class="panel-inner" id="panel-border" style="display:none">
      <div class="bopt-row" id="border-row"></div>
      <div id="color-wrap" style="display:none">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <input type="color" id="color-native" value="#ffffff" style="width:36px;height:36px;border:1px solid var(--bdl);border-radius:4px;cursor:pointer;padding:2px;background:var(--sur);">
          <span id="color-hex" style="font-size:11px;letter-spacing:.05em;color:var(--muted);">#FFFFFF</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;" id="color-presets"></div>
      </div>
    </div>
  </div>

  <div id="footer-logo">mamaroku</div>
</div>

<!-- Premium unlock modal -->
<div id="premium-modal" onclick="if(event.target===this)closePremiumModal()">
  <div id="premium-modal-box">
    <div id="premium-modal-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="42" height="48" fill="none" stroke="currentColor" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 10px;">
        <path d="M25 52V36C25 20 75 20 75 36V52"/>
        <rect x="8" y="52" width="84" height="58" rx="2"/>
        <circle cx="50" cy="81" r="8" fill="currentColor" stroke="none"/>
      </svg>

// ── State ──
const CATS=['basic_1','basic_3','basic_4','template','basic_2','unenu_2','cloud','flower','star'];
let activeCat=CATS[0], selIdx=0, selSize=400;
let borderStyle='none', borderColor='#ffffff';
let userImg=null, photoOx=0, photoOy=0;


// ── Premium ──
const PREMIUM_SHAPE_CATS=['basic_2','unenu_2','cloud','flower','star','template'];
const PREMIUM_MATERIAL_CATS='all'; // 'all' = すべて。配列指定も可: ['フレーム','TAPE']
const PREMIUM_CODE='mamaroku123'; // ← 解除コードをここで変更

let premiumUnlocked=localStorage.getItem('mamaroku_premium')==='1';

function showUnlockModal(){
  document.getElementById('premium-code-input').value='';
  document.getElementById('premium-code-error').textContent='';
  document.getElementById('premium-modal').classList.add('show');
  setTimeout(()=>document.getElementById('premium-code-input').focus(),150);
}
function closePremiumModal(){
  document.getElementById('premium-modal').classList.remove('show');
}
function tryUnlockPremium(){
  const val=document.getElementById('premium-code-input').value.trim();
  if(val===PREMIUM_CODE){
    premiumUnlocked=true;
    localStorage.setItem('mamaroku_premium','1');
    closePremiumModal();
    renderCategoryTabs();
    if(document.getElementById('material-screen').classList.contains('active')) buildMaterialScreen();
    showMatToast('🔓 プレミアム解除！');
  }else{
    document.getElementById('premium-code-error').textContent='コードが違います';
    document.getElementById('premium-code-input').value='';
  }
}
document.getElementById('premium-code-submit').onclick=tryUnlockPremium;
document.getElementById('premium-code-input').onkeydown=e=>{if(e.key==='Enter')tryUnlockPremium();};

// ── Panel toggle ──
let activePanel=null;
let colorPickerInited=false;
function togglePanel(name){
  const panel=document.getElementById('panel');
  const all=['photo','shape','border'];
  if(activePanel===name){
    panel.classList.remove('open');
    all.forEach(n=>{ const p=document.getElementById('panel-'+n); const t=document.getElementById('tool-'+n); if(p)p.style.display='none'; if(t)t.classList.remove('active'); });
    activePanel=null;
  }else{
    all.forEach(n=>{ const p=document.getElementById('panel-'+n); const t=document.getElementById('tool-'+n); if(p)p.style.display='none'; if(t)t.classList.remove('active'); });
    document.getElementById('panel-'+name).style.display='block';
    document.getElementById('tool-'+name).classList.add('active');
    panel.classList.add('open');
    activePanel=name;
// color picker inited via bopt onclick
  }
  // パネル開閉後にcanvasサイズを再計算し、写真があれば必ず再描画する
  setTimeout(()=>{
    resizePreview();
    // resizePreviewでrender()が呼ばれなかった場合の保険
    if(userImg) requestAnimationFrame(()=>render());
  },300);
}

// ── Init UI ──
function renderCategoryTabs(){
  const catRow=document.getElementById('cat-row');
  catRow.innerHTML='';
  const CAT_LABELS={'basic_1':'ベーシック I','basic_2':'うねうね I','basic_3':'ベーシック II','basic_4':'ベーシック IV','cloud':'クラウド','flower':'フラワー','star':'スター','unenu_2':'うねうね II','template':'テンプレート'};
  CATS.forEach(cat=>{
    const isPremium=!premiumUnlocked&&PREMIUM_SHAPE_CATS.includes(cat);
    const b=document.createElement('div');
    b.className='cat-opt'+(cat===activeCat?' selected':'')+(isPremium?' premium-locked':'');
    b.innerHTML=(isPremium?'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="10" height="12" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px;"><path d="M25 52V36C25 20 75 20 75 36V52"/><rect x="8" y="52" width="84" height="58" rx="2"/><circle cx="50" cy="81" r="9" fill="currentColor" stroke="none"/></svg>':'')+(CAT_LABELS[cat]||cat.toUpperCase());
    b.onclick=()=>{
      document.querySelectorAll('.cat-opt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');activeCat=cat;renderGrid();
    };
    catRow.appendChild(b);
  });
  renderGrid();
}

function initUI(){
  renderCategoryTabs();

  // Border options
  const BOPTS=[
    {val:'none',label:'なし'},
    {val:'border_thin',label:'フチ（細）'},
    {val:'border_thick',label:'フチ（太）'},
    {val:'bordershadow_thin',label:'フチ＋影（細）'},
    {val:'bordershadow_thick',label:'フチ＋影（太）'},
    {val:'shadow_only',label:'影のみ'},
  ];
  const brow=document.getElementById('border-row');
  BOPTS.forEach(opt=>{
    const b=document.createElement('div');
    b.className='bopt'+(opt.val==='none'?' selected':'');
    b.textContent=opt.label;
    b.onclick=()=>{
      document.querySelectorAll('.bopt').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected'); borderStyle=opt.val;
      const showColor=borderStyle.startsWith('border');
      document.getElementById('color-wrap').style.display=showColor?'block':'none';
      if(showColor && !colorPickerInited){ colorPickerInited=true; initColorPicker(); }
      if(userImg) requestAnimationFrame(()=>render());
    };
    brow.appendChild(b);
  });

  // Color picker inits lazily when border panel first opens

  // Sizes
  [{l:'S',p:400},{l:'M',p:700},{l:'L',p:1000}].forEach(s=>{
    const b=document.createElement('div');
    b.className='szbtn'+(s.p===selSize?' selected':'');
    b.textContent=s.l;
    b.onclick=()=>{ document.querySelectorAll('.szbtn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selSize=s.p; render(); };
    document.getElementById('size-row').appendChild(b);
  });
}

},{passive:false});

// ── applyTransform / drawShapeElements / drawShapeMask / renderToCanvas ──
function applyTransform(ctx,tf){
  const tm=tf.match(/translate\(([-.\d]+)[\s,]+([-.\d]+)\)/);
  const rm=tf.match(/rotate\(([-.\d]+)\)/);
  const sm=tf.match(/scale\(([-.\d]+)\)/);
  if(tm)ctx.translate(+tm[1],+tm[2]);
  if(rm)ctx.rotate(+rm[1]*Math.PI/180);
  if(sm)ctx.scale(+sm[1],+sm[1]);
}
function drawShapeElements(ctx,size,mode,strokeWidth){
  const vbParts=VBOXES[selIdx].split(' ').map(Number);
  const vbX=vbParts[0],vbY=vbParts[1],vbW=vbParts[2],vbH=vbParts[3];
  const sc=Math.min(size/vbW,size/vbH);
  const tx=(size-vbW*sc)/2-vbX*sc;
  const ty=(size-vbH*sc)/2-vbY*sc;
  ctx.save(); ctx.translate(tx,ty); ctx.scale(sc,sc);
  if(mode==='stroke'){ ctx.lineWidth=strokeWidth/sc; ctx.lineJoin='round'; ctx.lineCap='round'; }
  const parser=new DOMParser();
  const doc=parser.parseFromString('<svg xmlns="http://www.w3.org/2000/svg">'+SHAPES[selIdx].inner+'</svg>','image/svg+xml');
  doc.querySelectorAll('path,circle,rect,ellipse,polygon').forEach(el=>{
    const t=el.tagName.toLowerCase();
    const tf2=el.getAttribute('transform');
    ctx.save();
    if(tf2) applyTransform(ctx,tf2);
    ctx.beginPath();
    if(t==='path'){
      const p=new Path2D(el.getAttribute('d'));
      if(mode==='fill') ctx.fill(p); else ctx.stroke(p);
    } else if(t==='circle'){
      ctx.arc(+el.getAttribute('cx')||0, +el.getAttribute('cy')||0, +el.getAttribute('r')||0, 0, Math.PI*2);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='ellipse'){
      ctx.ellipse(+el.getAttribute('cx')||0, +el.getAttribute('cy')||0, +el.getAttribute('rx')||0, +el.getAttribute('ry')||0, 0, 0, Math.PI*2);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='rect'){
      const rx=+el.getAttribute('rx')||0;
      const x=+el.getAttribute('x')||0, y=+el.getAttribute('y')||0;
      const w=+el.getAttribute('width')||0, h=+el.getAttribute('height')||0;
      if(rx>0) ctx.roundRect(x,y,w,h,rx); else ctx.rect(x,y,w,h);
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    } else if(t==='polygon'){
      const pts=(el.getAttribute('points')||'').trim().split(/[\s,]+/).map(Number);
      for(let i=0;i<pts.length;i+=2) i===0?ctx.moveTo(pts[i],pts[i+1]):ctx.lineTo(pts[i],pts[i+1]);
      ctx.closePath();
      if(mode==='fill') ctx.fill(); else ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();
}
function drawShapeMask(ctx,size){ ctx.fillStyle='#000'; drawShapeElements(ctx,size,'fill',0); }

function renderToCanvas(canvas,size){
  const hasBorder=borderStyle.startsWith('border');
  const hasShadow=borderStyle.includes('shadow')||borderStyle==='shadow_only';
  const isThick=borderStyle.includes('thick');
  const borderPx=hasBorder?(isThick?size*.11:size*.055):0;
  const borderOverhang=hasBorder?Math.ceil(borderPx):0;
  const shadowPad=hasShadow?Math.round(size*.08):0;
  const pad=borderOverhang+shadowPad;
  const full=size+pad*2;
  canvas.width=full; canvas.height=full;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,full,full);
  const zoom=parseInt(document.getElementById('zoom').value)/100;
  const previewW=previewBaseSize||240;
  const ox=photoOx*(size/previewW);
  const oy=photoOy*(size/previewW);
  const photoC=document.createElement('canvas'); photoC.width=size; photoC.height=size;
  const pCtx=photoC.getContext('2d');
  if(userImg){ const sc=Math.max(size/userImg.width,size/userImg.height)*zoom; pCtx.drawImage(userImg,(size-userImg.width*sc)/2+ox,(size-userImg.height*sc)/2+oy,userImg.width*sc,userImg.height*sc); }
  const maskC=document.createElement('canvas'); maskC.width=size; maskC.height=size;
  drawShapeMask(maskC.getContext('2d'),size);
  pCtx.globalCompositeOperation='destination-in'; pCtx.drawImage(maskC,0,0);
  let borderC=null;
  if(hasBorder){
    borderC=document.createElement('canvas'); borderC.width=full; borderC.height=full;
    const bCtx=borderC.getContext('2d');
    bCtx.save(); bCtx.translate(pad,pad);
    bCtx.fillStyle=borderColor; drawShapeElements(bCtx,size,'fill',0);
    bCtx.strokeStyle=borderColor; drawShapeElements(bCtx,size,'stroke',borderPx*2);
    bCtx.globalCompositeOperation='destination-out'; drawShapeElements(bCtx,size,'fill',0);
    bCtx.restore();
  }
  if(hasShadow){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=shadowPad*1.6; ctx.shadowOffsetX=shadowPad*.2; ctx.shadowOffsetY=shadowPad*.5;
    if(borderC)ctx.drawImage(borderC,0,0); else ctx.drawImage(photoC,pad,pad);
    ctx.restore();
  }
  if(borderC)ctx.drawImage(borderC,0,0);
  ctx.drawImage(photoC,pad,pad);
}


function render(){
  if(!userImg)return;
  try{
    renderToCanvas(document.getElementById('preview'),previewBaseSize||240);
  }catch(e){
    console.warn('render error:',e);
  }
}

// ── Resize preview ──// ── Resize preview ──
function resizePreview(){
  const main=document.getElementById('main-screen');
  if(!main||!main.classList.contains('active'))return;
  const topBar=document.getElementById('top-bar');
  const zoomRow=document.getElementById('zoom-row');
  const sizeRow=document.getElementById('size-row-wrap');
  const toolBar=document.getElementById('tool-bar');
  const panel=document.getElementById('panel');
  const footer=document.getElementById('footer-logo');
  const H=window.innerHeight;
  const W=window.innerWidth;
  const usedH=(topBar?topBar.offsetHeight:40)
             +(zoomRow?zoomRow.offsetHeight:28)
             +(sizeRow?sizeRow.offsetHeight:28)
             +(toolBar?toolBar.offsetHeight:50)
             +(panel?panel.offsetHeight:0)
             +(footer?footer.offsetHeight:28)
             +40;
  const sz=Math.max(80, Math.min(H-usedH, W-16));
  const cv=document.getElementById('preview');
  if(!cv)return;
  // サイズが変わった時だけcanvasをリセット（フチ選択で不必要にリセットされるのを防ぐ）
  if(cv.width!==sz || cv.height!==sz){
    // canvasサイズが変わる場合、photoOx/photoOyをスケール変換して位置を維持する
    if(cv.width && cv.width!==sz){
      const ratio=sz/cv.width;
      photoOx=photoOx*ratio;
      photoOy=photoOy*ratio;
    }
    cv.width=sz; cv.height=sz;
    cv.style.width=sz+'px'; cv.style.height=sz+'px';
    previewBaseSize=sz;
    if(userImg) render();
  } else {
    // サイズが同じでも描画内容が消えている可能性があるので再描画
    previewBaseSize=sz;
    if(userImg) render();
  }
}
window.addEventListener('resize',resizePreview);

let MATERIALS = [];

async function loadMaterialsFromJSON() {
  console.log('素材読み込み開始');
  try {
    const response = await fetch('materials.json');
    
    if (!response.ok) {
      console.warn('materials.json not found');
      return [];
    }
    
    const data = await response.json();
    console.log('読み込んだカテゴリ数:', data.categories ? data.categories.length : 0);
    
    const allMaterials = [];
    
    // 全カテゴリの素材を1つの配列にまとめる
    Object.keys(data.materials || {}).forEach(category => {
      console.log(`カテゴリ "${category}":`, data.materials[category].length, '個');
      data.materials[category].forEach(item => {
        allMaterials.push({
          label: item.name || category,
          src: item.data,
          category: category
        });
      });
    });
    
    console.log('合計素材数:', allMaterials.length);
    return allMaterials;
  } catch (error) {
    console.error('素材読み込みエラー:', error);
    return [];
  }
}

function showMaterialScreen() {
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('material-screen').classList.add('active');
}
function hideMaterialScreen() {
  document.getElementById('material-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  setTimeout(()=>{ resizePreview(); if(userImg) render(); }, 100);
}
function selectMaterial(src) {
  // 透過PNGをfetchしてClipboard APIでコピー
  fetch(src)
    .then(r => r.blob())
    .then(blob => {
      // blobがpngでない場合はpngに変換
      if (blob.type === 'image/png') return blob;
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const cv = document.createElement('canvas');
          cv.width = img.naturalWidth; cv.height = img.naturalHeight;
          const ctx = cv.getContext('2d');
          ctx.clearRect(0, 0, cv.width, cv.height); // 透過を保持
          ctx.drawImage(img, 0, 0);
          cv.toBlob(resolve, 'image/png');
        };
        img.src = URL.createObjectURL(blob);
      });
    })
    .then(pngBlob => navigator.clipboard.write([
      new ClipboardItem({ 'image/png': pngBlob })
    ]))
    .then(() => {
      showMatToast('コピーしました ✓');
    })
    .catch(() => {
      // フォールバック：モーダルで長押しコピーを促す
      document.getElementById('copy-modal-img').src = src;
      document.getElementById('copy-modal').classList.add('show');
    });
}

function showMatToast(msg) {
  let t = document.getElementById('mat-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'mat-toast';
    t.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brown);color:var(--cream,#faf7f2);padding:10px 24px;border-radius:100px;font-size:13px;font-family:"Cormorant Garamond",serif;letter-spacing:0.1em;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:10000;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2000);
}
function useMaterialForTrimming(src) {
  // 素材をphotoとして読み込んでトリミング画面へ
  const img = new Image();
  img.onload = () => {
    userImg = img;
    photoOx = 0; photoOy = 0;
    document.getElementById('dl-btn').disabled = false;
    document.getElementById('copy-btn').disabled = false;
    document.getElementById('zoom').value = 100;
    document.getElementById('zoom-val').textContent = '100%';
    const ph=document.getElementById('preview-placeholder');
    if(ph) ph.style.display='none';
    activePanel = null;
    document.getElementById('panel').classList.remove('open');
    ['photo','shape','border'].forEach(n=>{
      document.getElementById('panel-'+n).style.display='none';
      document.getElementById('tool-'+n).classList.remove('active');
    });
    hideMaterialScreen();
  };
  img.src = src;
}
function buildMaterialScreen() {
  const grid = document.getElementById('mat-grid');
  const filterContainer = document.getElementById('mat-filter');
  
  // 素材がない場合の表示
  if (MATERIALS.length === 0) {
    filterContainer.innerHTML = '<div style="padding: 8px; font-size:12px; color: var(--faint); text-align: center; width: 100%;">管理画面から素材をアップロードしてください</div>';
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 48px 16px; color: var(--faint); font-size:13px; line-height: 1.8;">素材がまだアップロードされていません<br>管理画面（material-admin.html）から<br>カテゴリと素材を追加してください</div>';
    return;
  }
  
  // カテゴリ一覧を取得
  const categories = [...new Set(MATERIALS.map(m => m.category))];
  
  // カテゴリフィルターボタンを生成
  filterContainer.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='mat-filter-btn active';
  allBtn.dataset.category='all';
  allBtn.textContent='すべて';
  allBtn.addEventListener('click',()=>filterMaterials('all'));
  filterContainer.appendChild(allBtn);

  categories.forEach(cat => {
    const isCatLocked=!premiumUnlocked&&(PREMIUM_MATERIAL_CATS==='all'||(Array.isArray(PREMIUM_MATERIAL_CATS)&&PREMIUM_MATERIAL_CATS.includes(cat)));
    const btn=document.createElement('button');
    btn.className='mat-filter-btn'+(isCatLocked?' premium-locked':'');
    btn.dataset.category=cat;
    btn.innerHTML=(isCatLocked?'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="10" height="12" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px;"><path d="M25 52V36C25 20 75 20 75 36V52"/><rect x="8" y="52" width="84" height="58" rx="2"/><circle cx="50" cy="81" r="9" fill="currentColor" stroke="none"/></svg>':'')+cat;
    btn.addEventListener('click',()=>filterMaterials(cat));
    filterContainer.appendChild(btn);
  });

  // 初期表示
  renderMaterials(MATERIALS);
}

function renderLockedMaterials(){
  const grid=document.getElementById('mat-grid');
  grid.innerHTML='<div onclick="showUnlockModal()" style="grid-column:1/-1;text-align:center;padding:48px 16px;cursor:pointer;"><div style="margin-bottom:14px;display:flex;justify-content:center;"><svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 115\' width=\'40\' height=\'46\' fill=\'none\' stroke=\'var(--text)\' stroke-width=\'7.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M25 52V36C25 20 75 20 75 36V52\'/><rect x=\'8\' y=\'52\' width=\'84\' height=\'58\' rx=\'2\'/><circle cx=\'50\' cy=\'81\' r=\'8\' fill=\'var(--text)\' stroke=\'none\'/></svg></div><div style="font-size:14px;color:var(--rose);letter-spacing:.05em;margin-bottom:8px;">プレミアム限定コンテンツ</div><div style="font-size:12px;color:var(--faint);line-height:1.9;">コードを入力して解除できます<br>タップしてコードを入力</div></div>';
}

function filterMaterials(category) {
  // アクティブボタンの切り替え
  document.querySelectorAll('.mat-filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelector(`[data-category="${category}"]`).classList.add('active');
  
  // 素材をフィルタリング
  const filtered = category === 'all' 
    ? MATERIALS 
    : MATERIALS.filter(m => m.category === category);
  
  renderMaterials(filtered);
}

function renderMaterials(materials) {
  const grid = document.getElementById('mat-grid');
  grid.innerHTML = '';
  
  if (materials.length === 0) {
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 32px; color: var(--faint); font-size:13px;">素材がありません</div>';
    return;
  }
  
  materials.forEach(m => {
    const isMatLocked=!premiumUnlocked&&(PREMIUM_MATERIAL_CATS==='all'||(Array.isArray(PREMIUM_MATERIAL_CATS)&&PREMIUM_MATERIAL_CATS.includes(m.category)));
    const card = document.createElement('div');
    card.className = 'mat-card';
    card.style.position='relative';
    const imgEl = document.createElement('img');
    imgEl.src = m.src;
    imgEl.alt = m.label;
    // isMatLocked opacity removed — show full image
    card.appendChild(imgEl);
    if(isMatLocked){
      const lk=document.createElement('div');
      lk.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" fill="none" stroke="var(--text)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"><path d="M25 52V36C25 20 75 20 75 36V52"/><rect x="8" y="52" width="84" height="58" rx="2"/><circle cx="50" cy="81" r="8" fill="var(--text)" stroke="none"/></svg>';
      lk.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:26px;pointer-events:none;';
      card.appendChild(lk);
      card.addEventListener('click',()=>showUnlockModal());
    }else{
      card.addEventListener('click', () => selectMaterial(m.src));
    }
    grid.appendChild(card);
  });
}

// ── 起動初期化 ──
initUI();
resizePreview();

// ============================================================
// Hidden Admin Access
// ============================================================
let pressCount = 0;
const loginBanner = document.getElementById('login-banner');

if (loginBanner) {
  loginBanner.addEventListener('click', (e) => {
    e.preventDefault();
    pressCount++;

    if (pressCount >= 5) {
      window.open('material-admin.html', '_self');
      pressCount = 0;
    }

    setTimeout(() => {
      pressCount = 0;
    }, 3000);
  });
}

</script>
</body>
</html>
